{% extends 'base.html' %}
{% load static %}
{% block content %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Routing</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Leaflet and Bootstrap JS -->
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <link rel="stylesheet" href="{% static '/mapstyles.css' %}">
    <link rel="stylesheet" href="{% static '/styles.css' %}">
    <script type="text/javascript" src="{% static "/js/mapping.js" %}"></script>

</head>
<body>
    <div class="container">
        <h1 class="mb-4 text-center">Project Routing</h1>
        <div class="row">
            <!-- Project List -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Project List</h5>
                        <!-- Tab Navigation -->
                        <ul class="nav nav-tabs" id="projectTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="completedProjectsTab" data-bs-toggle="tab" data-bs-target="#completedProjectsContent" type="button" role="tab" aria-controls="completedProjectsContent" aria-selected="false">One Point Projects</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="inProgressProjectsTab" data-bs-toggle="tab" data-bs-target="#inProgressProjectsContent" type="button" role="tab" aria-controls="inProgressProjectsContent" aria-selected="false">Two Point Projects</button>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body">
                        <!-- Tab Content -->
                        <div class="tab-content" id="projectTabsContent">
                            <!-- All Projects Tab Content -->
                            <div class="tab-pane fade show active" id="allProjectsContent" role="tabpanel" aria-labelledby="allProjectsTab">
                                <ul id="projectListAll" class="list-group"></ul>
                            </div>
                            <!-- Completed Projects Tab Content -->
                            <div class="tab-pane fade" id="completedProjectsContent" role="tabpanel" aria-labelledby="completedProjectsTab">
                                <ul id="projectListCompleted" class="list-group"></ul>
                            </div>
                            <!-- Projects In Progress Tab Content -->
                            <div class="tab-pane fade" id="inProgressProjectsContent" role="tabpanel" aria-labelledby="inProgressProjectsTab">
                                <ul id="projectListInProgress" class="list-group"></ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Project Map -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Project Map</h5>
                    </div>
                    <div class="card-body">
                        <div id="mapone"></div>
                        <div id="markerCoordinates"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (optional, for Bootstrap components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <!-- Custom JavaScript -->

</body>
</html>
{% endblock %}
