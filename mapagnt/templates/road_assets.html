{% extends 'base.html' %}
{% load static %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Asset Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <link rel="stylesheet" href="{% static 'road_assets_style.css' %}">
    <link rel="stylesheet" href="{% static '/styles.css' %}">
</head>
<body>
<div class="container-fluid">
    <h1 class="mb-4 text-center">Road Asset Management</h1>

    <div class="row mb-3">
        <!-- Filter Controls -->
        <div class="col-md-12">
            <div class="card mb-3">
                <div class="card-body d-flex flex-wrap gap-3 align-items-end">
                    <div>
                        <label for="filterProject" class="form-label">Project</label>
                        <select id="filterProject" class="form-select form-select-sm">
                            <option value="">All Projects</option>
                            {% for proj in projects %}
                            <option value="{{ proj.id }}">{{ proj.twopname }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label for="filterAssetType" class="form-label">Asset Type</label>
                        <select id="filterAssetType" class="form-select form-select-sm">
                            <option value="">All Types</option>
                            {% for val, label in asset_types %}
                            <option value="{{ val }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label for="filterCondition" class="form-label">Condition</label>
                        <select id="filterCondition" class="form-select form-select-sm">
                            <option value="">All Conditions</option>
                            {% for val, label in condition_choices %}
                            <option value="{{ val }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <button id="btnApplyFilter" class="btn btn-primary btn-sm">Apply Filter</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <!-- Asset Map -->
        <div class="col-md-7">
            <div class="card">
                <div class="card-header"><h5 class="card-title">Asset Map</h5></div>
                <div class="card-body">
                    <div id="assetMap" style="height: 500px;"></div>
                </div>
            </div>
        </div>

        <!-- Asset List & Add Form -->
        <div class="col-md-5">
            <div class="card mb-3">
                <div class="card-header">
                    <ul class="nav nav-tabs card-header-tabs" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#assetListTab" type="button">Asset List</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#addAssetTab" type="button">Add Asset</button>
                        </li>
                    </ul>
                </div>
                <div class="card-body">
                    <div class="tab-content">
                        <!-- Asset List Tab -->
                        <div class="tab-pane fade show active" id="assetListTab">
                            <div id="assetListContainer" style="max-height: 420px; overflow-y: auto;">
                                <p class="text-muted">Loading assets...</p>
                            </div>
                        </div>

                        <!-- Add Asset Tab -->
                        <div class="tab-pane fade" id="addAssetTab">
                            <form id="addAssetForm">
                                {% csrf_token %}
                                <div class="mb-2">
                                    <label class="form-label">Project</label>
                                    <select name="project" class="form-select form-select-sm" required>
                                        <option value="">Select Project</option>
                                        {% for proj in projects %}
                                        <option value="{{ proj.id }}">{{ proj.twopname }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label">Asset Type</label>
                                    <select name="asset_type" class="form-select form-select-sm" required>
                                        {% for val, label in asset_types %}
                                        <option value="{{ val }}">{{ label }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label">Condition</label>
                                    <select name="condition" class="form-select form-select-sm" required>
                                        {% for val, label in condition_choices %}
                                        <option value="{{ val }}">{{ label }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label">Chainage (m)</label>
                                    <input type="number" name="chainage" class="form-control form-control-sm" step="0.01" required>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label">Latitude</label>
                                    <input type="text" name="lat" id="assetLat" class="form-control form-control-sm" required>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label">Longitude</label>
                                    <input type="text" name="lng" id="assetLng" class="form-control form-control-sm" required>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label">Installation Date</label>
                                    <input type="date" name="installation_date" class="form-control form-control-sm">
                                </div>
                                <p class="text-muted small">Click on map to set location.</p>
                                <button type="submit" class="btn btn-primary btn-sm">Add Asset</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Condition Summary -->
            <div class="card">
                <div class="card-header"><h5 class="card-title">Condition Summary</h5></div>
                <div class="card-body">
                    <div id="conditionSummary" class="d-flex gap-2 flex-wrap"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static '/js/road_assets.js' %}"></script>
</body>
</html>
{% endblock %}
