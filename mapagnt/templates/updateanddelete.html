{% extends 'base.html' %}
{% load static %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'upanddestyles.css' %}">
    <link rel="stylesheet" href="{% static '/styles.css' %}">
    <script type="text/javascript" src="{% static "/js/upanddel.js" %}"></script>

</head>
<body>
    <div class="container-fluid">
        <div class="row mt-4">
            <!-- Tabs Section -->
            <div class="col-md-12">
                <ul class="nav nav-tabs" id="projectTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="onePointTab" data-bs-toggle="tab" data-bs-target="#onePointContent" type="button" role="tab" aria-controls="onePointContent" aria-selected="true">Update Project (One Point)</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="twoPointsTab" data-bs-toggle="tab" data-bs-target="#twoPointsContent" type="button" role="tab" aria-controls="twoPointsContent" aria-selected="false">Update Project (Two Point)</button>
                    </li>
                </ul>
                <div class="tab-content" id="projectTabsContent">
                    <!-- Add New Project (One Point) Tab Content -->
                    <div class="tab-pane fade show active" id="onePointContent" role="tabpanel" aria-labelledby="onePointTab">
                        <div class="card">
                            <div class="card-body">
                                <h2 class="card-title">Update Project (One Point)</h2>
                                <form id="addOnePointProjectForm">
                                    <div class="mb-3">
                                        <label for="onePointProjectName" class="form-label">Project Name:</label>
                                        <input type="text" class="form-control" id="onePointProjectName" name="onePointProjectName" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="onePointProjectType" class="form-label">Project Type:</label>
                                        <select class="form-select" id="onePointProjectType" name="onePointProjectType" required>
                                            <option value="pipeline">Pipe Line</option>
                                            <option value="highwayconstruction">Highway Construction</option>
                                            <option value="roadrehabilitation">Road Rehabilitation</option>
                                            <option value="drainagerehabilitation">Drainage Rehabilitation</option>
                                            <option value="bridgesandtunnels">Bridges and Tunnels</option>
                                        </select>
                                    </div>
                                    <button type="submit" class="btn btn-primary">Update Project (One Point)</button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <!-- Add New Project (Two Points) Tab Content -->
                    <div class="tab-pane fade" id="twoPointsContent" role="tabpanel" aria-labelledby="twoPointsTab">
                        <div class="card">
                            <div class="card-body">
                                <h2 class="card-title">Update Project (Two Points)</h2>
                                <form id="addTwoPointsProjectForm">
                                    <div class="mb-3">
                                        <label for="twoPointsProjectName" class="form-label">Project Name:</label>
                                        <input type="text" class="form-control" id="twoPointsProjectName" name="twoPointsProjectName" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="twoPointsProjectType" class="form-label">Project Type:</label>
                                        <select class="form-select" id="twoPointsProjectType" name="twoPointsProjectType" required>
                                            <option value="pipeline">Pipe Line</option>
                                            <option value="highwayconstruction">Highway Construction</option>
                                            <option value="roadrehabilitation">Road Rehabilitation</option>
                                            <option value="drainagerehabilitation">Drainage Rehabilitation</option>
                                            <option value="bridgesandtunnels">Bridges and Tunnels</option>
                                        </select>
                                    </div>
                                    <button type="submit" class="btn btn-primary">Update Project (Two Points)</button>
                                </form>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (optional, for Bootstrap components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Leaflet JS (for map functionality, if needed) -->
    <script src="https://unpkg.com/leaflet@1.8.0/dist/leaflet.js"></script>

</body>
</html>
{% endblock %}
